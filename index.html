<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datengraf</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
</head>
<body>

<!-- ── Wizard Modal ────────────────────────────────────────────── -->
<div class="modal-backdrop hidden" id="wizard-backdrop">
  <div class="wizard" role="dialog" aria-modal="true">
    <div class="wizard-header">
      <div class="wizard-title">Neuen Datenfluss erfassen</div>
      <div class="step-indicators" id="step-indicators"></div>
    </div>
    <div class="wizard-body" id="wizard-body"></div>
    <div class="wizard-footer">
      <span class="step-hint" id="wizard-hint"></span>
      <div class="btn-row" style="margin:0">
        <button class="btn btn-secondary btn-sm" id="wizard-cancel">Abbrechen</button>
        <button class="btn btn-secondary btn-sm" id="wizard-back">← Zurück</button>
        <button class="btn btn-primary btn-sm"   id="wizard-next">Weiter →</button>
      </div>
    </div>
  </div>
</div>

<div class="app-shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>Filter</span>
      <button class="btn btn-secondary btn-sm" id="clear-filters-btn">Zurücksetzen</button>
    </div>

    <div class="sidebar-section">
      <h3>Beziehungstyp</h3>
      <div class="chip-group" id="filter-chips-relation"></div>
    </div>

    <div class="sidebar-section">
      <h3>Schutzbedarf</h3>
      <div class="chip-group" id="filter-chips-schutz"></div>
    </div>

    <div class="sidebar-section">
      <h3>Erfassungsart</h3>
      <div class="chip-group" id="filter-chips-erfassung"></div>
    </div>

    <div class="sidebar-section">
      <h3>Organisation</h3>
      <div class="filter-group">
        <select id="filter-organization"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Abteilung</h3>
      <div class="filter-group">
        <select id="filter-department"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Häufigkeit</h3>
      <div class="filter-group">
        <select id="filter-frequency"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Format</h3>
      <div class="filter-group">
        <select id="filter-format"><option value="all">Alle</option></select>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Suche</h3>
      <div class="filter-group">
        <input type="text" id="filter-search" placeholder="Akteur suchen…">
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="btn btn-secondary btn-sm" id="export-csv-btn">⬇ CSV exportieren</button>
      <button class="btn btn-secondary btn-sm" id="save-local-btn">💾 Im Browser speichern</button>
      <button class="btn btn-secondary btn-sm" id="load-local-btn">📂 Aus Browser laden</button>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <div class="main">
    <div class="topbar">
      <button class="btn btn-secondary btn-icon" id="sidebar-toggle-btn" title="Filter ein-/ausblenden">☰</button>
      <span class="topbar-brand">Datengraf</span>
      <nav class="topbar-tabs">
        <button class="topbar-tab active" data-tab="list">Listenansicht</button>
        <button class="topbar-tab" data-tab="network">Netzwerkkarte</button>
        <button class="topbar-tab" data-tab="insights">Netzwerk-Insights</button>
      </nav>
      <div class="topbar-spacer"></div>
      <button class="btn btn-primary btn-sm" id="open-wizard-btn">+ Datenfluss erfassen</button>
    </div>

    <div class="content">

      <!-- Import Panel -->
      <div class="import-panel">
        <div class="import-panel-header" id="import-toggle">
          <span>📥</span>
          <span class="import-panel-title">CSV importieren</span>
          <span class="import-panel-toggle" id="import-toggle-label">▼ öffnen</span>
        </div>
        <div class="import-panel-body" id="import-body">
          <div class="import-method-tabs">
            <button class="import-method-tab active" data-import="paste">Einfügen</button>
            <button class="import-method-tab" data-import="url">URL</button>
            <button class="import-method-tab" data-import="file">Datei</button>
          </div>

          <div class="import-section active" id="import-paste">
            <textarea id="csv-input" class="csv-textarea" placeholder="CSV-Daten hier einfügen…"></textarea>
          </div>

          <div class="import-section" id="import-url">
            <div class="url-row">
              <input type="text" id="csv-url" placeholder="https://raw.githubusercontent.com/…/data.csv">
              <button class="btn btn-primary btn-sm" id="btn-url-load">Laden</button>
            </div>
          </div>

          <div class="import-section" id="import-file">
            <div class="file-drop-zone" id="drop-zone">
              <input type="file" id="csv-file" accept=".csv">
              <div>📄 Datei auswählen oder hierher ziehen</div>
              <div style="font-size:11px;color:var(--c-muted);margin-top:4px" id="file-name-display"></div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary btn-sm" id="btn-visualize">Visualisieren</button>
            <button class="btn btn-secondary btn-sm" id="btn-append">Zu vorhandenen Daten hinzufügen</button>
          </div>
          <div id="status-message"></div>
        </div>
      </div>

      <!-- Legend -->
      <div class="legend">
        <strong style="font-size:12px">Beziehungen:</strong>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rel-übergibt)"></div>übergibt</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rel-nutzt)"></div>nutzt</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rel-erstellt)"></div>erstellt</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rel-empfängt)"></div>empfängt</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rel-verarbeitet)"></div>verarbeitet</div>
        <span style="margin-left:10px;color:var(--c-muted)">|</span>
        <strong style="font-size:12px">Schutz:</strong>
        <div class="legend-item"><div class="legend-dot" style="background:var(--schutz-dsgvo)"></div>DSGVO</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--schutz-intern)"></div>Intern</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--schutz-oeffentlich)"></div>Öffentlich</div>
      </div>

      <!-- Tab panels -->
      <div class="tab-panel active" id="panel-list">
        <div id="list-stats" class="list-stats"></div>
        <div id="list-content"></div>
      </div>

      <div class="tab-panel" id="panel-network">
        <div class="network-toolbar">
          <button class="btn btn-secondary btn-sm"  id="btn-reset-layout">Layout neu</button>
          <button class="btn btn-icon btn-secondary" id="btn-zoom-in"    title="+">+</button>
          <button class="btn btn-icon btn-secondary" id="btn-zoom-out"   title="−">−</button>
          <button class="btn btn-icon btn-secondary" id="btn-zoom-fit"   title="Anpassen">=</button>
          <button class="btn btn-icon btn-secondary" id="btn-fullscreen" title="Vollbild">⛶</button>
        </div>
        <div id="network-container"></div>
      </div>

      <div class="tab-panel" id="panel-insights">
        <div class="insights-grid" id="insights-grid"></div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /app-shell -->

<script src="js/app.js"></script>
</body>
</html>
