name: FTP Deploy

on:
  push:
    branches:
      - main # Oder dein Release-Branch

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    # Falls du einen Build-Schritt hast (z.B. npm):
    # - name: Install and Build
    #   run: |
    #     npm install
    #     npm run build

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ a2ea9.netcup.net }}
        username: ${{ ftp_paderta }}
        password: ${{ jn59E_1d }}
        local-dir: ./dist/ # Dein lokaler Build-Ordner
        server-dir: ./code.nozilla.net/httpdocs/datengraf # Dein Zielordner auf dem Server
